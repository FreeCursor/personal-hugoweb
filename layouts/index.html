<body style="background-color: #f5f5e5; color: #1D1D1F; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.6; max-width: 1100px; margin: 0 auto; padding: 40px 20px;">
    
    <nav style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 60px;">
        <a href="/" style="font-weight: 700; font-size: 1.2rem; text-decoration: none; color: #1D1D1F;">Haoyu's Page</a>
    
        <div style="display: flex; gap: 12px;"> 
            <a href="/research/" style="display: inline-block; padding: 8px 16px; background-color: #c8c8ad7d; color: #1D1D1F; text-decoration: none; border-radius: 8px; font-weight: 500;">Research</a>
        
            <a href="/activities/" style="display: inline-block; padding: 8px 16px; background-color: #c8c8ad7d; color: #1D1D1F; text-decoration: none; border-radius: 8px; font-weight: 500;">Activities</a>
        </div>     
    </nav>

    <main style="display: flex; justify-content: space-between; align-items: flex-start; gap: 40px; margin-top: 40px; text-align: left; flex-wrap: wrap;">
        
        <div style="flex: 1; min-width: 280px; margin-top: -20px;"> 
            <style>
                /* 1. 给视频强制加高并保持 16:9 比例 */
                main iframe, main video {
                    width: 110% !important;
                    height: 110% !important;
                    aspect-ratio: 16 / 9 !important;
                    margin-top: 10px !important; /* 视频和欢迎语字样之间依然保持 60px 的高级留白 */
                    border-radius: 12px !important;
                    position: relative !important;
                }
                
                /* 2. 核心破解：撕掉 Hugo 自动生成的隐形紧箍咒外壳 */
                main div:has(iframe) {
                    height: auto !important;
                    padding-bottom: 0 !important; 
                    overflow: visible !important;
                }

                @media (max-width: 768px) {
                    main iframe, main video {
                        margin-top: 40px !important;
                    }
                }

                /* 3. 双重保障：强行剥离浏览器标题自带的固执默认空隙，防止字被默认样式锁死 */
                main h1, main h2, main p:first-child {
                    margin-top: 0 !important;
                    padding-top: 0 !important;
                }
            </style>
            {{ .Content }}
        </div>

        <div style="flex: 0 1 320px; width: 100%; max-width: 320px; text-align: center; margin-top: 30px;">
            <img src="/profile-picture1.jpg" alt="Haoyu's selfie" style="width: 100%; max-width: 320px; height: auto; border-radius: 16px; box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08); object-fit: cover;">
        </div>

    </main>

</body>
<canvas id="particle-canvas" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none;"></canvas>

    <!-- background  -->
    <script>
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        
        // 让画布尺寸永远等于浏览器窗口大小
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // 粒子类定义
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.8; // 移动速度 X
                this.vy = (Math.random() - 0.5) * 0.8; // 移动速度 Y
                this.radius = Math.random() * 1.5 + 1.5;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(29, 29, 31, 0.15)'; // 粒子的颜色（浅灰，不刺眼）
                ctx.fill();
            }
        }

        // 初始化 250 个粒子
        for (let i = 0; i < 250; i++) particles.push(new Particle());

        // 每帧渲染动画逻辑（高频高精度定时器）
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 绘制粒子并连线
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    // 如果两个粒子距离很近，就画一条隐隐约约的连线
                    if (dist < 100) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = `rgba(29, 29, 31, ${0.1 * (1 - dist / 100)})`;
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animate);
        }
        animate();
    </script>
