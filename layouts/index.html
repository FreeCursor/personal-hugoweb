<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ .Site.Title }}</title>
</head>
<body style="background-color: #f5f5e5; color: #1D1D1F; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.6; max-width: 1000px; margin: 0 auto; padding: 40px 20px;">
    
    <nav style="display: flex; justify-content: space-between; margin-bottom: 60px;">
        <a href="/" style="font-weight: bold; text-decoration: none; color: #1D1D1F;">Haoyu's Space</a>
        <div>
            <a href="/research/" style="margin-right: 20px; text-decoration: none; color: #515154;">Research</a>
            <a href="/activities/" style="margin-right: 20px; text-decoration: none; color: #515154;">Activities</a>
        </div>
    </nav>

    <main style="text-align: left;">
        {{ .Content }}
    </main>

</body>
<canvas id="particle-canvas" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none;"></canvas>

    <script>
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        
        // 让画布尺寸永远等于浏览器窗口大小
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // 粒子类定义
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.8; // 移动速度 X
                this.vy = (Math.random() - 0.5) * 0.8; // 移动速度 Y
                this.radius = Math.random() * 1.5 + 1.5;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(29, 29, 31, 0.15)'; // 粒子的颜色（浅灰，不刺眼）
                ctx.fill();
            }
        }

        // 初始化 80 个粒子
        for (let i = 0; i < 250; i++) particles.push(new Particle());

        // 每帧渲染动画逻辑（高频高精度定时器）
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 绘制粒子并连线
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    // 如果两个粒子距离很近，就画一条隐隐约约的连线
                    if (dist < 100) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = `rgba(29, 29, 31, ${0.1 * (1 - dist / 100)})`;
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</html>
